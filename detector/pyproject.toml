[project]
name = "aidetector"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "litellm>=1.55.3",
    "pydantic>=2.11.10",
    "ultralytics>=8.3.214",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
main = "aidetector:main"

[dependency-groups]
dev = [
    "ruff>=0.14.10",
    "ty>=0.0.5",
    "pyinstaller>=6.17.0",
]

[tool.hatch.metadata]
allow-direct-references = true

