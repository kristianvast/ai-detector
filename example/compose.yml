services:
  aidetector:
    image: "ghcr.io/eschouten/ai-detector:latest"

    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864

    volumes:
      - ./config.json:/app/config.json
      - ./sprong24.mp4:/app/sprong24.mp4
      - ./detections/:/app/detections

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
