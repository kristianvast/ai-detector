name: CI

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group:
    ${{ github.workflow }}-${{ github.ref_name }}-${{
    github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  publish:
    name: "Build and publish image to GitHub Container Registry"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -a -f
          df -h
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/eschouten/ai-detector:latest,ghcr.io/eschouten/ai-detector:${{ github.ref_name }}
          push: true

  build-exe:
    name: "Build Windows Executable"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Dependencies
        run: |
          uv venv --python 3.12
          uv pip install --pre torch torchvision . pyinstaller --index-url https://download.pytorch.org/whl/nightly/cu130 --extra-index-url https://pypi.org/simple --index-strategy unsafe-best-match

      - name: Collect CUDA DLLs
        run: |
          . .venv/Scripts/activate
          $TORCH_PATH = python -c "import torch; import os; print(os.path.dirname(torch.__file__))"
          New-Item -ItemType Directory -Force -Path dll
          Copy-Item -Path "$TORCH_PATH/lib/*.dll" -Destination dll
          ls dll

      - name: Build Executable
        run: uv run --no-sync pyinstaller src/aidetector/__init__.py --name aidetector --onefile --hidden-import ultralytics --add-data "dll/*;." --paths src --clean --noconfirm

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: aidetector-exe
          path: dist/aidetector.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aidetector.exe
