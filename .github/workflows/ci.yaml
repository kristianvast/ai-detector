name: CI

on:
  push:
    tags:
      - '*'

concurrency:
  group:
    ${{ github.workflow }}-${{ github.ref_name }}-${{
    github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  publish:
    name: "Build and publish image to GitHub Container Registry"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/eschouten/ai-detector:latest,ghcr.io/eschouten/ai-detector:${{ github.ref_name }}
          push: true

  build-exe:
    name: "Build Windows Executable"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Build Executable
        run: uv run pyinstaller src/aidetector/__init__.py --name aidetector --onefile --hidden-import ultralytics --collect-all torch --collect-all ultralytics --paths src --clean --noconfirm

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: aidetector-exe
          path: dist/aidetector.exe

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aidetector.exe

