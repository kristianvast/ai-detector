name: Web

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Windows exe
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: web
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: pnpm install

      - name: "Warm Bun compile cache (Windows D: workaround)"
        run: |
          $warmupRoot = "C:\bun-warmup-${env:GITHUB_RUN_ID}"
          New-Item -ItemType Directory -Path $warmupRoot -Force | Out-Null
          Set-Content -Path "$warmupRoot\index.ts" -Encoding UTF8 -Value 'console.log("bun warmup");'
          Push-Location $warmupRoot
          bun build --compile --target=bun-windows-x64-baseline .\index.ts --outfile .\warmup-baseline.exe
          bun build --compile --target=bun-windows-x64 .\index.ts --outfile .\warmup.exe
          Pop-Location
          Remove-Item -Path $warmupRoot -Recurse -Force

      - name: Build
        run: pnpm run build

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: ai-detector-web-${{ github.ref_name }}-exe
          path: web/dist/ai-detector-web.exe

      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: web/dist/ai-detector-web-${{ github.ref_name }}.exe
