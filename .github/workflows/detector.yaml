  macos-default-exe:
    name: Build & Upload macOS Executable
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: detector
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build Executable
        run: |
          echo 'REF_NAME = "${{ github.ref_name }}"' > src/aidetector/utils/version.py
          uv run --extra default pyinstaller src/aidetector/__init__.py --name aidetector-osx-onnx-${{ github.ref_name }} --onefile --hidden-import ultralytics --collect-all litellm --collect-all onnxruntime --collect-all onnx --hidden-import=tiktoken_ext.openai_public --hidden-import=tiktoken_ext --paths src --clean --noconfirm

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: aidetector-osx-onnx-${{ github.ref_name }}-exe
          path: detector/dist/aidetector-osx-onnx-${{ github.ref_name }}

      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: detector/dist/aidetector-osx-onnx-${{ github.ref_name }}

  windows-nvidia-cuda130-exe:
    name: Build & Upload Windows Executable with CUDA 13.0
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: detector
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }}
          uv pip install --pre torch torchvision . pyinstaller --index-url https://download.pytorch.org/whl/cu130 --extra-index-url https://pypi.org/simple --index-strategy unsafe-best-match

      - name: Build EXE with PyInstaller
        run: |
          echo 'REF_NAME = "${{ github.ref_name }}"' > src/aidetector/utils/version.py
          uv run --no-sync pyinstaller src/aidetector/__init__.py --name aidetector-nvidia-cuda130-pt-${{ github.ref_name }} --onefile --hidden-import "ultralytics" --collect-all litellm --collect-all aidetector --hidden-import=tiktoken_ext.openai_public --hidden-import=tiktoken_ext --paths src --clean --noconfirm

      - name: Upload Executable
