name: Detector

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.13"

jobs:
  docker-image:
    name: Build & Publish Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -a -f
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/eschouten/ai-detector
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Publish to GitHub Container Registry
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        with:
          context: detector
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  windows-cpu-exe:
    name: Build & Upload Windows Executable with CPU
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: detector
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "detector/uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build Executable
        run: uv run pyinstaller src/aidetector/__init__.py --name aidetector-cpu-${{ github.ref_name }} --collect-all "llama_cpp" --collect-all "llama_cpp_python" --hidden-import "llama_cpp" --onefile --hidden-import ultralytics --paths src --clean --noconfirm

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: aidetector-cpu-${{ github.ref_name }}-exe
          path: detector/dist/aidetector-cpu-${{ github.ref_name }}.exe

      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: detector/dist/aidetector-cpu-${{ github.ref_name }}.exe

  windows-nvidia-exe:
    name: Build & Upload Windows Executable with CUDA
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: detector
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "detector/uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }}
          uv pip install --pre torch torchvision . pyinstaller --index-url https://download.pytorch.org/whl/nightly/cu130 --extra-index-url https://pypi.org/simple --index-strategy unsafe-best-match

      - name: Build Executable
        run: uv run --no-sync pyinstaller src/aidetector/__init__.py --name aidetector-nvidia-${{ github.ref_name }} --additional-hooks-dir=hooks --collect-all "llama_cpp" --collect-all "llama_cpp_python" --hidden-import "llama_cpp" --onefile --hidden-import ultralytics --paths src --clean --noconfirm

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: aidetector-nvidia-${{ github.ref_name }}-exe
          path: detector/dist/aidetector-nvidia-${{ github.ref_name }}.exe

      - name: Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: detector/dist/aidetector-nvidia-${{ github.ref_name }}.exe
