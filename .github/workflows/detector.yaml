name: Detector

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.13"

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - uses: actions/checkout@v6

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/eschouten/ai-detector

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: detector
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/eschouten/ai-detector,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/eschouten/ai-detector
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/eschouten/ai-detector@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/eschouten/ai-detector:${{ steps.meta.outputs.version }}

  windows-cpu-exe:
    name: Build & Upload Windows Executable with CPU
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: detector
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build Executable
        run: uv run pyinstaller src/aidetector/__init__.py --name aidetector-cpu-${{ github.ref_name }} --onefile --hidden-import ultralytics --paths src --clean --noconfirm

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: aidetector-cpu-${{ github.ref_name }}-exe
          path: detector/dist/aidetector-cpu-${{ github.ref_name }}.exe

      # - name: Release
      #   if: github.ref_type == 'tag'
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     files: detector/dist/aidetector-cpu-${{ github.ref_name }}.exe

  windows-nvidia-exe:
    name: Build & Upload Windows Executable with CUDA
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: detector
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }}
          uv pip install --pre torch torchvision . pyinstaller --index-url https://download.pytorch.org/whl/nightly/cu128 --extra-index-url https://pypi.org/simple --index-strategy unsafe-best-match

      - name: Build EXE with PyInstaller
        run: |
          uv run --no-sync pyinstaller src/aidetector/__init__.py --name aidetector-nvidia-${{ github.ref_name }} --onefile --hidden-import "ultralytics" --paths src --clean --noconfirm

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: aidetector-nvidia-${{ github.ref_name }}-exe
          path: detector/dist/aidetector-nvidia-${{ github.ref_name }}.exe

      # - name: Zip
      #   run: |
      #     Compress-Archive -Path "dist/aidetector-nvidia-${{ github.ref_name }}" -DestinationPath "dist/aidetector-nvidia-${{ github.ref_name }}.zip"

      # - name: Upload Zip
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: aidetector-nvidia-${{ github.ref_name }}-zip
      #     path: detector/dist/aidetector-nvidia-${{ github.ref_name }}.zip

      # - name: Release
      #   if: github.ref_type == 'tag'
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     files: detector/dist/aidetector-nvidia-${{ github.ref_name }}.exe
